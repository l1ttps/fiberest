# Air configuration for hot reload
# https://github.com/air-verse/air

root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
# Binary file name (Windows needs .exe extension)
bin = "./tmp/main.exe"

# Pre-build commands - run before each build
pre_cmd = ["task docs"]

# Build command
cmd = "go build -o ./tmp/main.exe ./cmd/server/main.go"

# Delay before triggering build
delay = 1000

# Exclude files/directories from watching
exclude_dir = [
    "assets",
    "tmp",
    "vendor",
    "testdata",
    "bin",
    "dist",
    "build",
    "docs",
]
exclude_file = []
exclude_regex = ["_test.go"]
exclude_unchanged = false
follow_symlink = false

# Include files/directories for watching
include_dir = []
include_ext = ["go", "tpl", "tmpl", "html"]

# Kill signal
kill_delay = "0s"

# Log file for build errors
log = "build-errors.log"

# Send Interrupt signal before killing process (for graceful shutdown)
send_interrupt = true
stop_on_error = false

[color]
app = ""
build = "yellow"
main = "magenta"
runner = "green"
watcher = "cyan"

[log]
time = false

[misc]
clean_on_exit = false

[screen]
clear_on_rebuild = false
