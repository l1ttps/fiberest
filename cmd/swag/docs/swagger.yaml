definitions:
  dto.GetManyUsersExample:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.UserResponse'
        type: array
      hasNextPage:
        type: boolean
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
    type: object
  dto.InitAdminRequest:
    properties:
      email:
        type: string
      password:
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  dto.InitAdminResponse:
    properties:
      email:
        type: string
      id:
        type: string
      name:
        type: string
      role:
        type: string
    type: object
  dto.UserResponse:
    properties:
      email:
        type: string
      id:
        type: string
      name:
        type: string
      role:
        type: string
    type: object
  http_error.ErrorResponse:
    properties:
      message:
        type: string
      status:
        type: integer
    type: object
  models.User:
    properties:
      createdAt:
        description: |-
          CreatedAt tracks when the record was created
          Automatically set by GORM on create
        type: string
      email:
        description: |-
          Email is the unique identifier for login
          Must be unique and not null
        type: string
      id:
        description: |-
          ID is the primary key using UUID v4 format
          GORM tag ensures it's stored as uuid type in PostgreSQL with primary key constraint
        type: string
      name:
        description: Name is the display name of the user
        type: string
      role:
        allOf:
        - $ref: '#/definitions/models.UserRole'
        description: Role determines user permissions (ADMIN or USER)
      updatedAt:
        description: |-
          UpdatedAt tracks when the record was last modified
          Automatically updated by GORM on save/update
        type: string
    type: object
  models.UserRole:
    enum:
    - ADMIN
    - USER
    type: string
    x-enum-varnames:
    - RoleAdmin
    - RoleUser
info:
  contact: {}
paths:
  /health-check:
    get:
      consumes:
      - text/plain
      description: Check if the server is running and return "OK"
      produces:
      - text/plain
      responses:
        "200":
          description: OK
          schema:
            type: string
      summary: Check health
      tags:
      - health-check
  /users:
    get:
      consumes:
      - application/json
      description: Retrieve a paginated list of all users with pagination metadata
      parameters:
      - default: 10
        description: 'Number of items per page (default: 10, max: 100)'
        in: query
        maximum: 100
        minimum: 1
        name: limit
        type: integer
      - default: 1
        description: 'Page number (default: 1)'
        in: query
        minimum: 1
        name: page
        type: integer
      - description: Search keyword for filtering users
        in: query
        name: search
        type: string
      - description: Filter by user role (ADMIN or USER)
        enum:
        - ADMIN
        - USER
        in: query
        name: role
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.GetManyUsersExample'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http_error.ErrorResponse'
      summary: Get paginated list of users
      tags:
      - users
  /users/{id}:
    get:
      consumes:
      - application/json
      description: Retrieve a single user by their unique ID
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.User'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http_error.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/http_error.ErrorResponse'
      summary: Get user by ID
      tags:
      - users
  /users/init:
    post:
      consumes:
      - application/json
      description: Create the first admin account with the provided email and password
      parameters:
      - description: Admin initialization request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.InitAdminRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.InitAdminResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http_error.ErrorResponse'
      summary: Initialize admin account
      tags:
      - users
swagger: "2.0"
