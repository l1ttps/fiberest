definitions:
  dto.ChangePasswordRequest:
    properties:
      currentPassword:
        type: string
      newPassword:
        minLength: 8
        type: string
    required:
    - currentPassword
    - newPassword
    type: object
  dto.ChangePasswordResponse:
    properties:
      message:
        example: Password changed successfully
        type: string
    type: object
  dto.GetManyUsersExample:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.UserResponse'
        type: array
      hasNextPage:
        type: boolean
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
    type: object
  dto.InitAdminRequest:
    properties:
      email:
        type: string
      password:
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  dto.InitAdminResponse:
    properties:
      email:
        type: string
      id:
        type: string
      name:
        type: string
      role:
        type: string
    type: object
  dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  dto.LoginResponse:
    properties:
      message:
        example: Login successful
        type: string
    type: object
  dto.SetPasswordRequest:
    properties:
      password:
        maxLength: 72
        minLength: 8
        type: string
    required:
    - password
    type: object
  dto.UpdateMyProfileRequest:
    properties:
      name:
        maxLength: 255
        minLength: 1
        type: string
    required:
    - name
    type: object
  dto.UpdateUserRequest:
    properties:
      email:
        type: string
      name:
        maxLength: 255
        minLength: 1
        type: string
      role:
        enum:
        - ADMIN
        - USER
        type: string
    type: object
  dto.UserResponse:
    properties:
      email:
        type: string
      id:
        type: string
      name:
        type: string
      role:
        type: string
    type: object
  http_error.ErrorResponse:
    properties:
      message:
        type: string
      status:
        type: integer
    type: object
  models.Session:
    properties:
      createdAt:
        description: |-
          CreatedAt tracks when the record was created
          Automatically set by GORM on create
        type: string
      expiresAt:
        description: ExpiresAt is when this session becomes invalid
        type: string
      id:
        description: |-
          ID is the primary key using UUID v4 format
          GORM tag ensures it's stored as uuid type in PostgreSQL with primary key constraint
        type: string
      ipAddress:
        description: IPAddress stores the IP address where the session was created
        type: string
      sessionToken:
        description: SessionToken is the unique token for this session (stored in
          cookie)
        type: string
      updatedAt:
        description: |-
          UpdatedAt tracks when the record was last modified
          Automatically updated by GORM on save/update
        type: string
      user:
        allOf:
        - $ref: '#/definitions/models.User'
        description: User relationship (many sessions belong to one user)
      userAgent:
        description: UserAgent stores the browser/user agent string
        type: string
      userId:
        description: UserID is the foreign key to the user
        type: string
    type: object
  models.User:
    properties:
      createdAt:
        description: |-
          CreatedAt tracks when the record was created
          Automatically set by GORM on create
        type: string
      email:
        description: |-
          Email is the unique identifier for login
          Must be unique and not null
        type: string
      id:
        description: |-
          ID is the primary key using UUID v4 format
          GORM tag ensures it's stored as uuid type in PostgreSQL with primary key constraint
        type: string
      name:
        description: Name is the display name of the user
        type: string
      role:
        allOf:
        - $ref: '#/definitions/models.UserRole'
        description: Role determines user permissions (ADMIN or USER)
      updatedAt:
        description: |-
          UpdatedAt tracks when the record was last modified
          Automatically updated by GORM on save/update
        type: string
    type: object
  models.UserRole:
    enum:
    - ADMIN
    - USER
    type: string
    x-enum-varnames:
    - RoleAdmin
    - RoleUser
info:
  contact: {}
paths:
  /auth/change-password:
    post:
      consumes:
      - application/json
      description: Changes the authenticated user's password. Requires the current
        password to be verified before setting the new password.
      parameters:
      - description: Change password request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ChangePasswordResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http_error.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/http_error.ErrorResponse'
      summary: Change user password
      tags:
      - Auth
  /auth/init:
    post:
      consumes:
      - application/json
      description: Creates the very first administrator (admin) account for the system
        using the provided email and password. This endpoint can only be called successfully
        once, when no admin accounts exist in the system yet.
      parameters:
      - description: Admin initialization request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.InitAdminRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.InitAdminResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http_error.ErrorResponse'
      summary: Initialize first administrator account
      tags:
      - Auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user using their email and password credentials.
        On successful authentication, creates a session and sets an HTTP-only cookie
        for subsequent authenticated requests.
      parameters:
      - description: Login request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http_error.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/http_error.ErrorResponse'
      summary: User authentication login
      tags:
      - Auth
  /auth/logout:
    post:
      description: Invalidates the current session by deleting it from the database
        and clearing the session cookie.
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/http_error.ErrorResponse'
      summary: User logout
      tags:
      - Auth
  /auth/session:
    get:
      description: Returns the current active session details.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Session'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/http_error.ErrorResponse'
      summary: Get current session
      tags:
      - Auth
  /health-check:
    get:
      consumes:
      - text/plain
      description: Check if the server is running and return "OK"
      produces:
      - text/plain
      responses:
        "200":
          description: OK
          schema:
            type: string
      summary: Check health
      tags:
      - Health Check
  /users:
    get:
      consumes:
      - application/json
      description: 'Returns a paginated list of all users in the system with support
        for pagination, search by name/email, and filtering by user role (ADMIN or
        USER). Response includes comprehensive pagination metadata: total users count,
        current page number, total pages, and items per page.'
      parameters:
      - default: 10
        description: 'Number of items per page (default: 10, max: 100)'
        in: query
        maximum: 100
        minimum: 1
        name: limit
        type: integer
      - default: 1
        description: 'Page number (default: 1)'
        in: query
        minimum: 1
        name: page
        type: integer
      - description: Search keyword for filtering users
        in: query
        name: search
        type: string
      - description: Filter by user role (ADMIN or USER)
        enum:
        - ADMIN
        - USER
        in: query
        name: role
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.GetManyUsersExample'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http_error.ErrorResponse'
      summary: Get paginated users list with filters
      tags:
      - Users
  /users/{id}:
    delete:
      consumes:
      - application/json
      description: Permanently removes a user from the system by their unique identifier.
        Returns 204 No Content on success.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: User deleted successfully
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http_error.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/http_error.ErrorResponse'
      summary: Delete user by ID
      tags:
      - Users
    get:
      consumes:
      - application/json
      description: Retrieves complete detailed information about a specific user using
        their unique identifier. Returns a 404 Not Found error if no user exists with
        the provided ID.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.User'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http_error.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/http_error.ErrorResponse'
      summary: Get user details by ID
      tags:
      - Users
    put:
      consumes:
      - application/json
      description: Updates user information (email, name, role) by user ID. Only provided
        fields will be updated. Returns updated user data.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - description: User update data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.User'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http_error.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/http_error.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/http_error.ErrorResponse'
      summary: Update user by ID
      tags:
      - Users
  /users/me:
    patch:
      consumes:
      - application/json
      description: Allows an authenticated user to update their profile (name and
        email). User ID is extracted from the session token.
      parameters:
      - description: Profile data (name required, email optional)
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateMyProfileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.User'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http_error.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/http_error.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/http_error.ErrorResponse'
      summary: Update my profile
      tags:
      - Users
  /users/set-password/{id}:
    post:
      consumes:
      - application/json
      description: Sets or updates the password for a user's EMAIL authentication
        account. Only admins can set passwords for any user.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - description: New password (min 8 characters)
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.SetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Password set successfully
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http_error.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/http_error.ErrorResponse'
      summary: Set password for a user
      tags:
      - Users
swagger: "2.0"
