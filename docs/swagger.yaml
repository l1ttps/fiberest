definitions:
  dto.GetManyUsersExample:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.UserResponse'
        type: array
      hasNextPage:
        type: boolean
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
    type: object
  dto.InitAdminRequest:
    properties:
      email:
        type: string
      password:
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  dto.InitAdminResponse:
    properties:
      email:
        type: string
      id:
        type: string
      name:
        type: string
      role:
        type: string
    type: object
  dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  dto.RefreshTokenRequest:
    properties:
      refreshToken:
        type: string
    required:
    - refreshToken
    type: object
  dto.TokenResponse:
    properties:
      accessToken:
        type: string
      refreshToken:
        type: string
    type: object
  dto.UserResponse:
    properties:
      email:
        type: string
      id:
        type: string
      name:
        type: string
      role:
        type: string
    type: object
  http_error.ErrorResponse:
    properties:
      message:
        type: string
      status:
        type: integer
    type: object
  models.User:
    properties:
      createdAt:
        description: |-
          CreatedAt tracks when the record was created
          Automatically set by GORM on create
        type: string
      email:
        description: |-
          Email is the unique identifier for login
          Must be unique and not null
        type: string
      id:
        description: |-
          ID is the primary key using UUID v4 format
          GORM tag ensures it's stored as uuid type in PostgreSQL with primary key constraint
        type: string
      name:
        description: Name is the display name of the user
        type: string
      role:
        allOf:
        - $ref: '#/definitions/models.UserRole'
        description: Role determines user permissions (ADMIN or USER)
      updatedAt:
        description: |-
          UpdatedAt tracks when the record was last modified
          Automatically updated by GORM on save/update
        type: string
    type: object
  models.UserRole:
    enum:
    - ADMIN
    - USER
    type: string
    x-enum-varnames:
    - RoleAdmin
    - RoleUser
info:
  contact: {}
paths:
  /health-check:
    get:
      consumes:
      - text/plain
      description: Check if the server is running and return "OK"
      produces:
      - text/plain
      responses:
        "200":
          description: OK
          schema:
            type: string
      summary: Check health
      tags:
      - health-check
  /users:
    get:
      consumes:
      - application/json
      description: 'Returns a paginated list of all users in the system with support
        for pagination, search by name/email, and filtering by user role (ADMIN or
        USER). Response includes comprehensive pagination metadata: total users count,
        current page number, total pages, and items per page.'
      parameters:
      - default: 10
        description: 'Number of items per page (default: 10, max: 100)'
        in: query
        maximum: 100
        minimum: 1
        name: limit
        type: integer
      - default: 1
        description: 'Page number (default: 1)'
        in: query
        minimum: 1
        name: page
        type: integer
      - description: Search keyword for filtering users
        in: query
        name: search
        type: string
      - description: Filter by user role (ADMIN or USER)
        enum:
        - ADMIN
        - USER
        in: query
        name: role
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.GetManyUsersExample'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http_error.ErrorResponse'
      summary: Get paginated users list with filters
      tags:
      - users
  /users/{id}:
    get:
      consumes:
      - application/json
      description: Retrieves complete detailed information about a specific user using
        their unique identifier. Returns a 404 Not Found error if no user exists with
        the provided ID.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.User'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http_error.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/http_error.ErrorResponse'
      summary: Get user details by ID
      tags:
      - users
  /users/init:
    post:
      consumes:
      - application/json
      description: Creates the very first administrator (admin) account for the system
        using the provided email and password. This endpoint can only be called successfully
        once, when no admin accounts exist in the system yet.
      parameters:
      - description: Admin initialization request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.InitAdminRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.InitAdminResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http_error.ErrorResponse'
      summary: Initialize first administrator account
      tags:
      - users
  /users/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user using their email and password credentials.
        On successful authentication, returns both JWT access token and refresh token,
        and sets secure HTTP-only cookies for subsequent authenticated requests.
      parameters:
      - description: Login request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.TokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http_error.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/http_error.ErrorResponse'
      summary: User authentication login
      tags:
      - users
  /users/refresh-token:
    post:
      consumes:
      - application/json
      description: Issues a new pair of JWT tokens (access token and refresh token)
        using a valid existing refresh token. This endpoint allows users to maintain
        their authenticated session without re-entering login credentials when their
        access token expires.
      parameters:
      - description: Refresh token request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.TokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http_error.ErrorResponse'
      summary: Refresh JWT authentication tokens
      tags:
      - users
swagger: "2.0"
